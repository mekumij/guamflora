<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guam Flora & Fungi · Field Guide</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500;1,700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root {
  --bg:        #f2ede4;
  --bg2:       #e8e1d4;
  --card:      #faf8f4;
  --ink:       #1c2416;
  --ink2:      #3d4f35;
  --ink3:      #7a8a6e;
  --green:     #2a5c20;
  --green2:    #3d7a2f;
  --greenlt:   #c8e6b8;
  --fungi:     #6b3a18;
  --fungilt:   #f0d4b0;
  --gold:      #c49a2a;
  --border:    #d0c8b4;
  --shadow:    rgba(28,36,22,0.14);
  --radius:    10px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--ink);font-family:'DM Sans',sans-serif;font-weight:300;min-height:100vh;overflow-x:hidden;}

/* ═══ HEADER ═══ */
header{
  background:var(--green);
  color:#f2ede4;
  display:flex;align-items:center;gap:1.2rem;
  padding:0 1.5rem;
  height:62px;
  position:sticky;top:0;z-index:300;
  box-shadow:0 2px 16px rgba(0,0,0,0.28);
}
.h-brand{display:flex;flex-direction:column;line-height:1;}
.h-title{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:700;letter-spacing:.01em;}
.h-sub{font-size:.62rem;font-weight:400;opacity:.55;letter-spacing:.14em;text-transform:uppercase;margin-top:2px;}
.h-gap{flex:1;}
.h-search{position:relative;display:flex;align-items:center;}
.h-search svg{position:absolute;left:10px;opacity:.5;pointer-events:none;}
#searchInput{
  background:rgba(255,255,255,.13);border:1.5px solid rgba(255,255,255,.22);
  border-radius:22px;color:#f2ede4;font-family:'DM Sans',sans-serif;
  font-size:.84rem;font-weight:300;padding:7px 14px 7px 34px;width:210px;outline:none;
  transition:background .2s,border-color .2s,width .28s;
}
#searchInput::placeholder{color:rgba(242,237,228,.4);}
#searchInput:focus{background:rgba(255,255,255,.2);border-color:rgba(255,255,255,.5);width:270px;}

/* view toggle */
.view-btns{display:flex;gap:4px;background:rgba(0,0,0,.2);border-radius:8px;padding:3px;}
.view-btn{
  background:transparent;border:none;color:rgba(242,237,228,.6);
  border-radius:6px;padding:5px 8px;cursor:pointer;
  display:flex;align-items:center;transition:all .18s;
}
.view-btn.active{background:rgba(255,255,255,.18);color:#f2ede4;}
.view-btn:hover:not(.active){color:#f2ede4;}

/* ═══ TOOLBAR ═══ */
.toolbar{
  background:var(--bg2);border-bottom:1px solid var(--border);
  padding:.65rem 1.5rem;display:flex;align-items:center;gap:.75rem;flex-wrap:wrap;
  position:sticky;top:62px;z-index:200;
}
.filter-row{display:flex;gap:5px;flex-wrap:wrap;align-items:center;}
.filter-label{font-size:.65rem;text-transform:uppercase;letter-spacing:.1em;color:var(--ink3);font-weight:500;white-space:nowrap;}
.tab{
  padding:4px 13px;border-radius:16px;font-size:.72rem;font-weight:500;
  letter-spacing:.05em;cursor:pointer;border:1.5px solid var(--border);
  color:var(--ink3);background:var(--card);transition:all .15s;white-space:nowrap;
}
.tab:hover:not(.active){border-color:var(--ink3);color:var(--ink2);}
.tab.active{background:var(--ink);border-color:var(--ink);color:var(--bg);}
.tab.plant.active{background:var(--green);border-color:var(--green);color:#f2ede4;}
.tab.fungi.active{background:var(--fungi);border-color:var(--fungi);color:#f2ede4;}

.sep{width:1px;height:22px;background:var(--border);margin:0 4px;}
.sort-wrap{display:flex;align-items:center;gap:6px;}
.sort-label{font-size:.65rem;text-transform:uppercase;letter-spacing:.1em;color:var(--ink3);font-weight:500;}
#sortSelect{
  background:var(--card);border:1px solid var(--border);border-radius:7px;
  padding:4px 8px;font-family:'DM Sans',sans-serif;font-size:.78rem;
  color:var(--ink2);cursor:pointer;outline:none;
}
#taxGroupSelect{
  background:var(--card);border:1px solid var(--border);border-radius:7px;
  padding:4px 8px;font-family:'DM Sans',sans-serif;font-size:.78rem;
  color:var(--ink2);cursor:pointer;outline:none;max-width:200px;
}
.count-pill{
  margin-left:auto;font-size:.7rem;color:var(--ink3);
  background:var(--card);border:1px solid var(--border);
  border-radius:12px;padding:3px 11px;white-space:nowrap;
}

/* ═══ MAIN VIEWS ═══ */
#viewGrid{display:block;}
#viewMap{display:none;height:calc(100vh - 62px - 56px);position:relative;}

/* ═══ GRID ═══ */
#grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(195px,1fr));
  gap:.9rem;padding:1.2rem 1.5rem;
  max-width:1700px;margin:0 auto;
}
.card{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  overflow:hidden;cursor:pointer;
  transition:transform .18s,box-shadow .18s,border-color .18s;
  animation:fadeUp .3s ease both;
}
.card:hover{transform:translateY(-4px);box-shadow:0 10px 28px var(--shadow);border-color:var(--ink3);}
.card.is-fungi{border-top:3px solid var(--fungi);}
.card.is-plant{border-top:3px solid var(--green2);}

.card-img{width:100%;aspect-ratio:4/3;background:var(--bg2);overflow:hidden;position:relative;}
.card-img img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .4s ease;}
.card:hover .card-img img{transform:scale(1.05);}
.no-img{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:2.2rem;opacity:.35;}
.pip-group{
  position:absolute;top:7px;right:7px;
  font-size:.58rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;
  padding:2px 7px;border-radius:10px;backdrop-filter:blur(6px);
}
.pip-group.Plantae{background:rgba(42,92,32,.82);color:#d0f0c0;}
.pip-group.Fungi{background:rgba(107,58,24,.82);color:#f8dcb0;}
.pip-obs{
  position:absolute;bottom:7px;left:7px;
  font-size:.62rem;color:rgba(242,237,228,.92);
  background:rgba(0,0,0,.42);padding:2px 8px;border-radius:8px;backdrop-filter:blur(4px);
}
.card-body{padding:9px 12px 13px;}
.card-cn{font-size:.78rem;font-weight:400;color:var(--ink3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-transform:capitalize;margin-bottom:3px;}
.card-sn{font-family:'Playfair Display',serif;font-style:italic;font-size:.98rem;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3;}
.card-tg{font-size:.62rem;color:var(--ink3);margin-top:4px;letter-spacing:.03em;}

/* no results */
#noResults{display:none;text-align:center;padding:5rem 2rem;color:var(--ink3);grid-column:1/-1;}
#noResults .nr-h{font-family:'Playfair Display',serif;font-size:1.5rem;color:var(--ink2);margin-bottom:.5rem;}

/* ═══ MAP ═══ */
#mapEl{width:100%;height:100%;}
.leaflet-popup-content-wrapper{
  background:var(--card);border:1px solid var(--border);border-radius:10px;
  box-shadow:0 4px 20px var(--shadow);font-family:'DM Sans',sans-serif;
}
.leaflet-popup-content{margin:10px 14px;}
.popup-sn{font-family:'Playfair Display',serif;font-style:italic;font-size:.95rem;color:var(--ink);}
.popup-cn{font-size:.75rem;color:var(--ink3);margin:2px 0 6px;}
.popup-btn{
  display:inline-block;background:var(--green);color:#f2ede4;border:none;
  border-radius:6px;padding:5px 12px;font-size:.72rem;cursor:pointer;
  font-family:'DM Sans',sans-serif;font-weight:400;letter-spacing:.03em;
  text-decoration:none;
}
.popup-btn.f{background:var(--fungi);}
.leaflet-popup-tip-container{display:none;}
.map-legend{
  position:absolute;bottom:20px;left:50%;transform:translateX(-50%);
  background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:10px 16px;display:flex;gap:14px;align-items:center;
  font-size:.7rem;color:var(--ink2);z-index:400;box-shadow:0 2px 12px var(--shadow);
  flex-wrap:wrap;justify-content:center;max-width:90vw;
}
.leg-dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:4px;}

/* ═══ DETAIL PANEL ═══ */
#backdrop{display:none;position:fixed;inset:0;background:rgba(20,30,16,.5);z-index:500;backdrop-filter:blur(3px);}
#backdrop.open{display:block;}
#detail{
  position:fixed;right:0;top:0;bottom:0;width:min(540px,100vw);
  background:var(--card);z-index:501;overflow-y:auto;
  transform:translateX(100%);
  transition:transform .32s cubic-bezier(.25,.46,.45,.94);
  box-shadow:-4px 0 40px rgba(0,0,0,.18);
  display:flex;flex-direction:column;
}
#detail.open{transform:translateX(0);}

#detailClose{
  position:sticky;top:0;z-index:10;
  background:var(--card);border-bottom:1px solid var(--border);
  padding:11px 16px;display:flex;align-items:center;gap:10px;cursor:pointer;
}
#detailClose:hover{background:var(--bg2);}
#detailClose span{font-size:.72rem;color:var(--ink3);letter-spacing:.1em;text-transform:uppercase;}

/* gallery */
.gal-main{width:100%;aspect-ratio:4/3;background:var(--bg2);overflow:hidden;}
.gal-main img{width:100%;height:100%;object-fit:cover;display:block;}
.gal-thumbs{display:flex;gap:6px;padding:8px 14px;background:var(--bg2);overflow-x:auto;}
.gal-thumbs img{width:62px;height:46px;object-fit:cover;border-radius:5px;cursor:pointer;opacity:.6;border:2px solid transparent;flex-shrink:0;transition:opacity .15s;}
.gal-thumbs img.active{opacity:1;border-color:var(--gold);}
.gal-thumbs img:hover{opacity:.85;}

/* meta */
.det-meta{padding:18px 20px 0;}
.det-tag{display:inline-block;font-size:.62rem;font-weight:500;letter-spacing:.12em;text-transform:uppercase;padding:3px 10px;border-radius:10px;margin-bottom:8px;}
.det-tag.Plantae{background:var(--greenlt);color:var(--green);}
.det-tag.Fungi{background:var(--fungilt);color:var(--fungi);}
.det-cn{font-size:.9rem;font-weight:400;color:var(--ink3);margin-bottom:3px;text-transform:capitalize;}
.det-sn{font-family:'Playfair Display',serif;font-style:italic;font-size:1.75rem;font-weight:700;color:var(--ink);line-height:1.2;margin-bottom:14px;}
.det-tg{font-size:.72rem;color:var(--ink3);letter-spacing:.04em;margin-top:-10px;margin-bottom:14px;}

.det-row{display:flex;gap:10px;padding:11px 0;border-top:1px solid var(--border);}
.det-row-lbl{font-size:.65rem;text-transform:uppercase;letter-spacing:.1em;color:var(--ink3);font-weight:500;min-width:96px;padding-top:2px;}
.det-row-val{font-size:.86rem;color:var(--ink2);line-height:1.6;flex:1;}

/* wikipedia */
.wiki-block{
  background:var(--bg2);border-radius:8px;padding:12px 14px;
  font-size:.83rem;line-height:1.65;color:var(--ink2);
  border-left:3px solid var(--gold);margin-top:2px;
}
.wiki-loading{color:var(--ink3);font-size:.8rem;font-style:italic;}
.wiki-src{font-size:.68rem;color:var(--ink3);margin-top:6px;}
.wiki-src a{color:var(--ink3);}

/* notes */
.notes-list{list-style:none;}
.notes-list li{font-size:.82rem;color:var(--ink2);line-height:1.6;padding:6px 0 6px 12px;border-left:2px solid var(--border);margin-bottom:5px;}

/* inat link */
.inat-link{
  display:flex;align-items:center;gap:8px;
  margin:16px 20px 24px;
  background:var(--green);color:#f2ede4;
  padding:11px 18px;border-radius:9px;text-decoration:none;
  font-size:.82rem;font-weight:400;letter-spacing:.04em;
  transition:filter .15s;
}
.inat-link.f{background:var(--fungi);}
.inat-link:hover{filter:brightness(1.12);}

/* mini map in detail */
#detailMap{width:100%;height:200px;background:var(--bg2);}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

/* ═══ RESOURCES ═══ */
.res-tab{
  background:none;border:1.5px solid var(--border);border-radius:20px;
  padding:6px 18px;font-family:'DM Sans',sans-serif;font-size:.78rem;font-weight:500;
  color:var(--ink3);cursor:pointer;transition:all .15s;letter-spacing:.04em;
}
.res-tab.active{background:var(--ink);border-color:var(--ink);color:var(--bg);}
.res-tab:hover:not(.active){border-color:var(--ink3);color:var(--ink2);}

.res-section-title{
  font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;
  color:var(--ink);margin-bottom:.3rem;letter-spacing:.01em;
}
.res-section-sub{font-size:.78rem;color:var(--ink3);margin-bottom:1.2rem;}

.res-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1rem;margin-bottom:2rem;}
.res-card{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:16px 18px;transition:box-shadow .18s,border-color .18s;
}
.res-card:hover{box-shadow:0 4px 18px var(--shadow);border-color:var(--ink3);}
.res-card-type{font-size:.6rem;font-weight:500;letter-spacing:.12em;text-transform:uppercase;padding:2px 8px;border-radius:10px;display:inline-block;margin-bottom:8px;}
.res-card-type.agency{background:var(--greenlt);color:var(--green);}
.res-card-type.garden{background:#d4eef7;color:#1a5e7a;}
.res-card-type.research{background:var(--fungilt);color:var(--fungi);}
.res-card-type.nonprofit{background:#e8e0f7;color:#4a2d8a;}
.res-card-name{font-size:.98rem;font-weight:500;color:var(--ink);margin-bottom:4px;line-height:1.3;}
.res-card-desc{font-size:.78rem;color:var(--ink3);line-height:1.55;margin-bottom:10px;}
.res-card-link{
  font-size:.73rem;color:var(--green);text-decoration:none;
  display:inline-flex;align-items:center;gap:4px;font-weight:500;
  transition:color .15s;
}
.res-card-link:hover{color:var(--green2);}
.res-card-link.fungi-link{color:var(--fungi);}

/* readings */
.reading-item{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:16px 20px;margin-bottom:.9rem;display:flex;gap:16px;align-items:flex-start;
  transition:box-shadow .18s,border-color .18s;
}
.reading-item:hover{box-shadow:0 4px 18px var(--shadow);border-color:var(--ink3);}
.reading-icon{
  width:42px;height:42px;border-radius:8px;display:flex;align-items:center;
  justify-content:center;font-size:1.2rem;flex-shrink:0;
}
.reading-icon.pdf{background:var(--fungilt);}
.reading-icon.journal{background:var(--greenlt);}
.reading-icon.book{background:#e8e0f7;}
.reading-icon.web{background:#d4eef7;}
.reading-body{flex:1;}
.reading-title{font-size:.92rem;font-weight:500;color:var(--ink);margin-bottom:2px;line-height:1.4;}
.reading-authors{font-size:.74rem;color:var(--ink3);margin-bottom:4px;font-style:italic;}
.reading-journal{font-size:.74rem;color:var(--ink3);margin-bottom:6px;}
.reading-tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px;}
.reading-tag{font-size:.62rem;padding:2px 8px;border-radius:10px;font-weight:500;letter-spacing:.06em;}
.reading-tag.flora{background:var(--greenlt);color:var(--green);}
.reading-tag.fungi{background:var(--fungilt);color:var(--fungi);}
.reading-tag.invasive{background:#fde8c8;color:#8a4a10;}
.reading-tag.micronesia{background:#d4eef7;color:#1a5e7a;}
.reading-tag.identification{background:#e8e0f7;color:#4a2d8a;}
.reading-link{font-size:.72rem;color:var(--green);text-decoration:none;display:inline-flex;align-items:center;gap:4px;font-weight:500;}
.reading-link:hover{color:var(--green2);}
.reading-link.pdf-link{color:var(--fungi);}

.add-your-own{
  background:var(--bg2);border:1.5px dashed var(--border);border-radius:var(--radius);
  padding:18px 20px;margin-top:1rem;
}
.add-your-own-title{font-size:.82rem;font-weight:500;color:var(--ink2);margin-bottom:6px;}
.add-your-own-desc{font-size:.76rem;color:var(--ink3);line-height:1.6;}
.add-your-own-desc code{background:var(--card);border:1px solid var(--border);border-radius:4px;padding:1px 5px;font-size:.72rem;color:var(--ink2);}

::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

@media(max-width:600px){
  header{padding:0 1rem;gap:.7rem;}
  .h-sub{display:none;}
  #searchInput{width:140px;}
  #searchInput:focus{width:170px;}
  .toolbar{padding:.5rem 1rem;gap:.4rem;top:62px;}
  #grid{padding:.8rem;gap:.7rem;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));}
}
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="h-brand">
    <div class="h-title">Guam Flora &amp; Fungi</div>
    <div class="h-sub">Field Guide · iNaturalist</div>
  </div>
  <div class="h-gap"></div>
  <div class="h-search">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" id="searchInput" placeholder="Search species…" autocomplete="off" spellcheck="false">
  </div>
  <div class="view-btns">
    <button class="view-btn active" id="btnGrid" title="Grid view" onclick="setView('grid')">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
    </button>
    <button class="view-btn" id="btnMap" title="Map view" onclick="setView('map')">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg>
    </button>
    <button class="view-btn" id="btnRes" title="Resources" onclick="setView('resources')">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
    </button>
  </div>
</header>

<!-- TOOLBAR -->
<div class="toolbar">
  <span class="filter-label">Group</span>
  <div class="filter-row" id="groupTabs">
    <button class="tab active" data-g="all">All</button>
    <button class="tab plant" data-g="Plantae">Plantae</button>
    <button class="tab fungi" data-g="Fungi">Fungi</button>
  </div>
  <div class="sep"></div>
  <span class="filter-label">Type</span>
  <select id="taxGroupSelect"><option value="all">All types</option></select>
  <div class="sep"></div>
  <div class="sort-wrap">
    <span class="sort-label">Sort</span>
    <select id="sortSelect">
      <option value="obs">Most observed</option>
      <option value="az">A→Z scientific</option>
      <option value="cn">A→Z common</option>
    </select>
  </div>
  <span class="count-pill" id="countPill">— species</span>
</div>

<!-- GRID VIEW -->
<div id="viewGrid">
  <div id="grid">
    <div id="noResults">
      <div class="nr-h">No species found</div>
      <div>Try a different search or filter</div>
    </div>
  </div>
</div>

<!-- MAP VIEW -->
<div id="viewMap">
  <div id="mapEl"></div>
  <div class="map-legend">
    <span><span class="leg-dot" style="background:#2a7d1a"></span>Plantae</span>
    <span><span class="leg-dot" style="background:#8b4a20"></span>Fungi</span>
    <span style="color:var(--ink3);font-size:.65rem">· Click a marker to view species</span>
  </div>
</div>

<!-- RESOURCES VIEW -->
<div id="viewResources" style="display:none;max-width:900px;margin:0 auto;padding:2rem 1.5rem;">

  <!-- Sub-tabs -->
  <div style="display:flex;gap:8px;margin-bottom:1.8rem;border-bottom:1px solid var(--border);padding-bottom:1rem;">
    <button class="res-tab active" data-rt="community" onclick="setResTab('community')">Community &amp; Organisations</button>
    <button class="res-tab" data-rt="readings" onclick="setResTab('readings')">Supplementary Readings</button>
  </div>

  <div id="rtCommunity"></div>
  <div id="rtReadings" style="display:none"></div>
</div>

<!-- BACKDROP -->
<div id="backdrop" onclick="closeDetail()"></div>

<!-- DETAIL PANEL -->

medium.jpg", "https://inaturalist-open-data.s3.amazonaws.com/photos/419901420/medium.jpeg"], "notes": ["Fleshy fuzzy leaves, growing in coastal limestone area with Pemphis acidula and Heliotropium arboreum. Also kind of looks like if those two plants made a weird Frankenstein plant. Anao, along coastline.", "Anao. Growing with Pemphis and Scaevola."], "obs": 3, "taxgroup": "Flowering Plants", "lat": 13.5448, "lon": 144.9352}, {"sn": "Argemone mexicana", "cn": "Mexican prickly poppy", "group": "Plantae", "tid": "128533", "imgs": ["https://inaturalist-open-data.s3.amazonaws.com/photos/31403078/medium.jpg", "https://inaturalist-open-data.s3.amazonaws.com/photos/31592763/medium.jpg", "https://static.inaturalist.org/photos/351703791/medium.jpeg"], "notes": [], "obs": 3, "taxgroup": "Flowering Plants", "lat": 13.45001, "lon": 144.79594}, {"sn": "Agave", "cn": "century plants", "group": "Plantae", "tid": "50822", "imgs": ["https://inaturalist-open-data.s3.amazonaws.com/photos/31430864/medium.jpg", "https://static.inaturalist.org/photos/42890710/medium.jpeg", "https://static.inaturalist.org/photos/79744515/medium.jpeg"], "notes": [], "obs": 3, "taxgroup": "Flowering Plants", "lat": 13.42401, "lon": 144.75702}, {"sn": "Kalanchoe pinnata", "cn": "Air Plant", "group": "Plantae", "tid": "164333", "imgs": ["https://static.inaturalist.org/photos/32496383/medium.jpg", "https://static.inaturalist.org/photos/149747040/medium.jpeg", "https://inaturalist-open-data.s3.amazonaws.com/photos/463676178/medium.jpeg"], "notes": ["Found on the rock cliff along the shore"], "obs": 3, "taxgroup": "Flowering Plants", "lat": 13.48082, "lon": 144.79917}, {"sn": "Aurantioideae", "cn": "", "group": "Plantae", "tid": "1363283", "imgs": ["https://inaturalist-open-data.s3.amazonaws.com/photos/33702642/medium.jpg", "https://static.inaturalist.org/photos/488537482/medium.jpg", "https://static.inaturalist.org/photos/564800816/medium.jpg"], "notes": [], "obs": 3, "taxgroup": "Flowering Plants", "lat": 13.48749, "lon": 144.80306}, {"sn": "Scaevola taccada sericea", "cn": "", "group": "Plantae", "tid": "605051", "imgs": ["https://inaturalist-open-data.s3.amazonaws.com/photos/42359712/medium.jpg", "https://inaturalist-open-data.s3.amazonaws.com/photos/73179630/medium.jpg", "https://inaturalist-open-data.s3.amazonaws.com/photos/95935251/medium.jpeg"], "notes": ["The app is getting confused by being across the dateline. Will try to fix this later.\n\nIdentified in the field. \n\nThere was a taxonomic change made for S. taccada by Kew and the Kew taxonomy is used by iNaturalist. S. taccada has been split into S. plumieri and S. Sericea. S. taccada is now a synonym for S. plumieri. S. plumieri and S. sericea have precedence over S. taccada. I would note that I was confused and had the temerity to write to Kew and ask about the change, and to my surprise Kew wrote right back:\n\n\"The references [to the taxon change] can be found here:\nhttp://plantsoftheworldonline.org/taxon/urn:lsid:ipni.org:names:384339-1#bibliography\n\nWhat you call Scaevola taccada with white fruits is probably now correctly known as S. sericea:\n\nhttp://plantsoftheworldonline.org/taxon/urn:lsid:ipni.org:names:30200356-2\n\nRegards, Rafa\u00ebl Govaerts\nSenior Content Editor \u2013 Plant & Fungal Names\nBiodiversity Informatics & Spatial Analysis\nRoyal Botanic Gardens, Kew, Jodrell Laboratory, Kew Road\nTW9 3DS, United Kingdom\"\n\nThe Kew herbarium sheet for S. plumieri http://powo.science.kew.org/taxon/urn:lsid:ipni.org:names:384294-1 notes \"Fruit blue or black, sub-globose, 10\u201315 mm. across, very fleshy, drying warty.\" Thus I now believe that the key photographic distinction will be the fruit color. White will apparently be S. sericea, black or blue will apparently be S. plumieri. Note that the taxon swap has not yet occurred in iNaturalist, thus the white fruited S. taccada cannot yet be IDed as S. sericea, only as S. taccada ssp. sericea. S. plumieri, on the other hand, is an available ID in iNaturalist.\n\nThe City of Sanibel Vegetation Committee has a good publication on distinguishing Scaevola plumieri:\n\nhttps://www.mysanibel.com/content/download/23790/147551\n\nSee also example ten at: https://www.iapt-taxon.org/nomen/pages/main/art_41.html for more background on the history of the Scaevola taccada (Gaertn.) Roxb. name:\n\n\"Scaevola taccada was validly published by Roxburgh (Hort. Bengal.: 15. 1814) solely by reference to an illustration in Rheede (Hort. Malab. 4: t. 59. 1683) that is associated with a description of a species. Because the same illustration was cited in the protologue of the earlier name Lobelia taccada Gaertn. (Fruct. Sem. Pl. 1: 119. 1788) and the two names apply to the same species, S. taccada is treated as a new combination, S. taccada (Gaertn.) Roxb., not as the name of a new species, even though in Roxburgh\u2019s protologue there is no reference, either direct or indirect, to L. taccada.\"\n\nExplanation: \"The names S. sericea and S. taccada have been very frequently been debated over the last 70 years or more. This all depended on a strict application of the code at the time or a less strict application. So much so that an effort has been made to conserve the name S. taccada as it was the most frequently used name at the time. This application was not accepted as instead the code was adjusted and by using this name as an example (Art 41.4 ex 10 (https://www.iapt-taxon.org/nomen/pages/main/art_41.html?)). \" - Robert Archer\n\nScaevola taccada/Scaevola taccada subsp. sericea/Scaevola sericea \"Apart from the white fruit, the thicker stems with the prominent leaf scars and the rounded leaves with its prominent midrib and venation distinguish this species.\" - Robert Archer, research scientist at South African National Biodiversity Institute (SANBI) \u00a0https://www.inaturalist.org/observations/13343808", "By shoreline near trail by Togcha cemetery. Flowers have a faint smell."], "obs": 3, "taxgroup": "Flowering Plants", "lat": 13.43496, "lon": 144.78585}, {"sn": "Syzygium", "cn": "Waterberries", "group": "Plantae", "tid": "72388", "imgs": ["https://static.inaturalist.org/photos/44771341/medium.jpg", "https://inaturalist-open-data.s3.amazonaws.com/photos/474961627/medium.jpg", "https://inaturalist-open-data.s3.amazonaws.com/photos/519996511/medium.jpg"], "notes": [], "obs": 3, "taxgroup": "Flowering Plants", "lat": 13.45851, "lon": 144.79488}, {"sn": "Thunbergia grandiflora", "cn": "Bengal trumpet", "group": "Plantae", "tid": "129036", "imgs": ["https://inaturalist-open-data.s3.amazonaws.com/photos/50999206/medium.jpg", "https://inaturalist-open-data.s3.amazonaws.com/photos/357429073/medium.jpeg", "https://inaturalist-open-data.s3.amazonaws.com/photos/484115668/medium.jpg"], "notes": [], "obs": 3, "taxgroup": "Flowering Plants", "lat": 13.42781, "lon": 144.74566}, {"sn": "Tectona grandis", "cn": "Teak", "group": "Plantae", "tid": "62887", "imgs": ["https://inaturalist-open-data.s3.amazonaws.com/photos/54182430/medium.jpg", "https://inaturalist-open-data.s3.amazonaws.com/photos/132502821/medium.jpg", "https://static.inaturalist.org/photos/191911424/medium.jpg"], "notes": ["Teak trees near Fonte Dam trailhead."], "obs": 3, "taxgroup": "Flowering Plants", "lat": 13.46088, "lon": 144.71652}, {"sn": "Scleria lithosperma", "cn": "Florida Keys Nutrush", "group": "Plantae", "tid": "168658", "imgs": ["https://inaturalist-open-data.s3.amazonaws.com/photos/54185840/medium.jpeg", "https://inaturalist-open-data.s3.amazonaws.com/photos/54186375/medium.jpg", "https://inaturalist-open-data.s3.amazonaws.com/photos/54259622/medium.jpg"], "notes": [], "obs": 3, "taxgroup": "Sedges", "lat": 13.46834, "lon": 144.71051}, {"sn": "Thelypteridoideae", "cn": "Maiden Ferns", "group": "Plantae", "tid": "867528", "imgs": ["https://inaturalist-open-data.s3.amazonaws.com/photos/54196571/medium.jpg", "https://inaturalist-open-data.s3.amazonaws.com/photos/462675363/medium.jpg", "https://static.inaturalist.org/p // ── STATE ─────────────────────────────────────────────────────────────
let gFilter = 'all', taxFilter = 'all', sortBy = 'obs', query = '';
let filtered = [], shown = 0;
const PAGE = 60;
let currentView = 'grid';
let leafletMap = null, markerLayer = null;
let detailMiniMap = null;

// ── TAXONOMY GROUPS ───────────────────────────────────────────────────
const PLANTAE_GROUPS = ['Flowering Plants','Ferns','Grasses','Sedges','Orchids','Palms','Cycads','Mosses','Liverworts'];
const FUNGI_GROUPS   = ['Gilled Mushrooms','Bracket & Shelf Fungi','Stinkhorns','Jelly Fungi','Cup & Sac Fungi','Earthstars & Puffballs','Lichens','Other Fungi'];
const ALL_TAX_GROUPS = [...PLANTAE_GROUPS, ...FUNGI_GROUPS];

// Build taxgroup select
const tgSel = document.getElementById('taxGroupSelect');
function rebuildTaxSelect() {
  const relevantGroups = gFilter === 'Plantae' ? PLANTAE_GROUPS
    : gFilter === 'Fungi' ? FUNGI_GROUPS : ALL_TAX_GROUPS;
  tgSel.innerHTML = '<option value="all">All types</option>';
  relevantGroups.forEach(g => {
    const cnt = SPECIES.filter(s => s.taxgroup === g && (gFilter === 'all' || s.group === gFilter)).length;
    if (cnt === 0) return;
    const o = document.createElement('option');
    o.value = g; o.textContent = `${g} (${cnt})`;
    tgSel.appendChild(o);
  });
  tgSel.value = 'all';
  taxFilter = 'all';
}
rebuildTaxSelect();

// ── FILTER & SORT ─────────────────────────────────────────────────────
function applyAll() {
  const q = query.toLowerCase().trim();
  filtered = SPECIES.filter(s => {
    if (gFilter !== 'all' && s.group !== gFilter) return false;
    if (taxFilter !== 'all' && s.taxgroup !== taxFilter) return false;
    if (q) return s.sn.toLowerCase().includes(q) || s.cn.toLowerCase().includes(q);
    return true;
  });
  if (sortBy === 'az') filtered.sort((a,b) => a.sn.localeCompare(b.sn));
  else if (sortBy === 'cn') filtered.sort((a,b) => (a.cn||a.sn).localeCompare(b.cn||b.sn));
  shown = 0;
  if (currentView === 'grid') renderGrid(true);
  else renderMap();
  document.getElementById('countPill').textContent = filtered.length.toLocaleString() + ' species';
}

// ── GRID ──────────────────────────────────────────────────────────────
function renderGrid(reset) {
  const grid = document.getElementById('grid');
  if (reset) {
    const nr = document.getElementById('noResults');
    grid.innerHTML = ''; grid.appendChild(nr);
  }
  const nr = document.getElementById('noResults');
  if (filtered.length === 0) { nr.style.display = 'block'; return; }
  nr.style.display = 'none';
  filtered.slice(shown, shown + PAGE).forEach((s,i) => {
    grid.appendChild(makeCard(s, shown + i));
  });
  shown += Math.min(PAGE, filtered.length - shown);
}

function makeCard(s, idx) {
  const el = document.createElement('div');
  el.className = 'card ' + (s.group === 'Fungi' ? 'is-fungi' : 'is-plant');
  el.style.animationDelay = (idx % PAGE * 18) + 'ms';
  const img = s.imgs[0]
    ? `<img src="${s.imgs[0]}" alt="${s.sn}" loading="lazy" onerror="this.parentNode.innerHTML='<div class=no-img>${s.group==='Fungi'?'🍄':'🌿'}</div>'">`
    : `<div class="no-img">${s.group==='Fungi'?'🍄':'🌿'}</div>`;
  el.innerHTML = `
    <div class="card-img">
      ${img}
      <span class="pip-group ${s.group}">${s.group}</span>
      <span class="pip-obs">${s.obs} obs</span>
    </div>
    <div class="card-body">
      <div class="card-cn">${s.cn || '—'}</div>
      <div class="card-sn">${s.sn}</div>
      <div class="card-tg">${s.taxgroup}</div>
    </div>`;
  el.addEventListener('click', () => openDetail(s));
  return el;
}

// infinite scroll
window.addEventListener('scroll', () => {
  if (currentView !== 'grid' || shown >= filtered.length) return;
  if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 500) renderGrid(false);
});

// ── MAP ───────────────────────────────────────────────────────────────
function initMap() {
  if (leafletMap) return;
  leafletMap = L.map('mapEl').setView([13.45, 144.78], 11);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© <a href="https://openstreetmap.org">OpenStreetMap</a>',
    maxZoom: 18
  }).addTo(leafletMap);
  markerLayer = L.layerGroup().addTo(leafletMap);
}

function renderMap() {
  initMap();
  markerLayer.clearLayers();
  // group nearby points — plot one marker per species
  filtered.forEach(s => {
    const isF = s.group === 'Fungi';
    const color = isF ? '#8b4a20' : '#2a7d1a';
    const circle = L.circleMarker([s.lat, s.lon], {
      radius: Math.min(4 + Math.log(s.obs + 1) * 1.5, 12),
      fillColor: color, color: '#fff',
      weight: 1.5, opacity: .9, fillOpacity: .75
    });
    circle.bindPopup(`
      <div class="popup-sn">${s.sn}</div>
      <div class="popup-cn">${s.cn || s.taxgroup}</div>
      <button class="popup-btn ${isF?'f':''}" onclick="document.getElementById('backdrop').dispatchEvent(new Event('close')); openDetailById('${s.tid}')">View species →</button>
    `);
    markerLayer.addLayer(circle);
  });
  setTimeout(() => leafletMap.invalidateSize(), 50);
}

// ── DETAIL ────────────────────────────────────────────────────────────
const tidIndex = {};
SPECIES.forEach(s => tidIndex[s.tid] = s);
function openDetailById(tid) { openDetail(tidIndex[tid]); }

function openDetail(s) {
  const isF = s.group === 'Fungi';
  const mainImg = s.imgs[0] || '';
  const thumbs = s.imgs.map((u,i) =>
    `<img src="${u}" class="${i===0?'active':''}" data-idx="${i}" loading="lazy" onerror="this.style.display='none'">`
  ).join('');
  const notesHtml = s.notes.length
    ? `<ul class="notes-list">${s.notes.map(n=>`<li>${n.substring(0,300).replace(/</g,'&lt;')}</li>`).join('')}</ul>`
    : `<span style="color:var(--ink3);font-size:.8rem">No observer notes recorded.</span>`;
  const inatUrl = `https://www.inaturalist.org/taxa/${s.tid}`;

  document.getElementById('detailContent').innerHTML = `
    <div class="detail-gallery">
      <div class="gal-main">${mainImg ? `<img id="gMainImg" src="${mainImg}" alt="${s.sn}">` : `<div class="no-img" style="height:100%;display:flex;align-items:center;justify-content:center;font-size:3rem">${isF?'🍄':'🌿'}</div>`}</div>
      ${s.imgs.length > 1 ? `<div class="gal-thumbs" id="gThumbs">${thumbs}</div>` : ''}
    </div>
    <div class="det-meta">
      <span class="det-tag ${s.group}">${s.group}</span>
      <div class="det-cn">${s.cn || 'Common name unknown'}</div>
      <div class="det-sn">${s.sn}</div>
      <div class="det-tg">${s.taxgroup}</div>
      <div class="det-row">
        <div class="det-row-lbl">Wikipedia</div>
        <div class="det-row-val" id="wikiBox"><span class="wiki-loading">Loading description…</span></div>
      </div>
      <div class="det-row">
        <div class="det-row-lbl">Observations</div>
        <div class="det-row-val">${s.obs.toLocaleString()} recorded on Guam</div>
      </div>
      <div class="det-row">
        <div class="det-row-lbl">Observer Notes</div>
        <div class="det-row-val">${notesHtml}</div>
      </div>
      <div class="det-row">
        <div class="det-row-lbl">Location</div>
        <div class="det-row-val">Centroid of ${s.obs} observation${s.obs>1?'s':''}</div>
      </div>
    </div>
    <div id="detailMap"></div>
    <a href="${inatUrl}" target="_blank" rel="noopener" class="inat-link ${isF?'f':''}">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      View full taxon on iNaturalist
    </a>`;

  // Thumb clicks
  document.querySelectorAll('#gThumbs img').forEach(th => {
    th.addEventListener('click', () => {
      const mi = document.getElementById('gMainImg');
      if (mi) mi.src = s.imgs[+th.dataset.idx];
      document.querySelectorAll('#gThumbs img').forEach(t => t.classList.remove('active'));
      th.classList.add('active');
    });
  });

  document.getElementById('detail').classList.add('open');
  document.getElementById('backdrop').classList.add('open');
  document.getElementById('detail').scrollTop = 0;

  // Mini map
  setTimeout(() => initDetailMap(s), 80);

  // Wikipedia
  fetchWiki(s.sn, isF);
}

function initDetailMap(s) {
  if (detailMiniMap) { detailMiniMap.remove(); detailMiniMap = null; }
  detailMiniMap = L.map('detailMap', {zoomControl:false, attributionControl:false}).setView([s.lat, s.lon], 12);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {maxZoom:18}).addTo(detailMiniMap);
  L.circleMarker([s.lat, s.lon], {
    radius:9, fillColor: s.group==='Fungi'?'#8b4a20':'#2a7d1a',
    color:'#fff', weight:2, fillOpacity:.9
  }).addTo(detailMiniMap);
}

// Wikipedia fetch
const wikiCache = {};
async function fetchWiki(sn, isF) {
  const box = document.getElementById('wikiBox');
  if (!box) return;
  if (wikiCache[sn]) { box.innerHTML = wikiCache[sn]; return; }
  try {
    // Try exact name first, then genus
    const genus = sn.split(' ')[0];
    const names = [sn, genus];
    let extract = null;
    let usedTitle = null;
    for (const name of names) {
      const url = `https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(name)}`;
      const r = await fetch(url);
      if (r.ok) {
        const d = await r.json();
        if (d.extract && d.extract.length > 60 && !d.extract.startsWith('may refer')) {
          extract = d.extract;
          usedTitle = d.title;
          break;
        }
      }
    }
    if (extract) {
      // Trim to ~3 sentences
      const sentences = extract.match(/[^.!?]+[.!?]+/g) || [extract];
      const trimmed = sentences.slice(0,3).join(' ').trim();
      const html = `<div class="wiki-block">${trimmed}<div class="wiki-src">Source: <a href="https://en.wikipedia.org/wiki/${encodeURIComponent(usedTitle)}" target="_blank" rel="noopener">Wikipedia — ${usedTitle}</a></div></div>`;
      wikiCache[sn] = html;
      if (document.getElementById('wikiBox')) document.getElementById('wikiBox').innerHTML = html;
    } else {
      const html = `<span style="color:var(--ink3);font-size:.8rem">No Wikipedia article found.</span>`;
      wikiCache[sn] = html;
      if (document.getElementById('wikiBox')) document.getElementById('wikiBox').innerHTML = html;
    }
  } catch(e) {
    if (document.getElementById('wikiBox')) document.getElementById('wikiBox').innerHTML = `<span style="color:var(--ink3);font-size:.8rem">Could not load Wikipedia.</span>`;
  }
}

function closeDetail() {
  document.getElementById('detail').classList.remove('open');
  document.getElementById('backdrop').classList.remove('open');
}
document.addEventListener('keydown', e => { if (e.key==='Escape') closeDetail(); });

// ── RESOURCES RENDERING ───────────────────────────────────────────────
const TYPE_ICONS = { pdf:'📄', journal:'📰', book:'📖', web:'🌐' };
const TAG_LABELS = { flora:'Flora', fungi:'Fungi', invasive:'Invasive Spp.', micronesia:'Micronesia', identification:'ID Reference' };

function renderCommunity() {
  const el = document.getElementById('rtCommunity');
  const grouped = {};
  RESOURCES.community.forEach(c => { (grouped[c.type] = grouped[c.type]||[]).push(c); });
  const ORDER = ['research','agency','garden','nonprofit'];
  const LABELS = { research:'UOG Research Facilities', agency:'Government Agencies', garden:'Gardens', nonprofit:'NGOs & Nonprofits' };
  let html = '';
  ORDER.forEach(type => {
    if (!grouped[type]) return;
    html += `<div class="res-section-title">${LABELS[type]}</div>
             <div class="res-section-sub">Community resources for Guam flora &amp; fungi</div>
             <div class="res-cards">`;
    grouped[type].forEach(c => {
      html += `<div class="res-card">
        <span class="res-card-type ${c.type}">${LABELS[c.type]?.split(' ')[0] || c.type}</span>
        <div class="res-card-name">${c.name}</div>
        <div class="res-card-desc">${c.desc}</div>
        <a class="res-card-link" href="${c.url}" target="_blank" rel="noopener">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
          ${c.label}
        </a>
      </div>`;
    });
    html += `</div>`;
  });
  html += `<div class="add-your-own">
    <div class="add-your-own-title">➕ Adding your own community sources</div>
    <div class="add-your-own-desc">
      Find the <code>RESOURCES</code> object near the bottom of the HTML file. Under <code>community:</code>, add a new entry in this format:<br><br>
      <code>{ type: "agency", name: "Your org name", desc: "Short description.", url: "https://...", label: "Visit site" }</code><br><br>
      Valid <code>type</code> values: <code>"agency"</code> · <code>"garden"</code> · <code>"research"</code> · <code>"nonprofit"</code>
    </div>
  </div>`;
  el.innerHTML = html;
}

function renderReadings() {
  const el = document.getElementById('rtReadings');
  let html = `<div class="res-section-title">Research Papers &amp; References</div>
    <div class="res-section-sub">Peer-reviewed literature, manuals, and open-access resources for Guam Plantae &amp; Fungi</div>`;
  RESOURCES.readings.forEach(r => {
    const tags = (r.tags || []).map(t => `<span class="reading-tag ${t}">${TAG_LABELS[t]||t}</span>`).join('');
    const byline = [r.authors, r.year].filter(Boolean).join(' · ');
    html += `<div class="reading-item">
      <div class="reading-icon ${r.type}">${TYPE_ICONS[r.type]||'📄'}</div>
      <div class="reading-body">
        <div class="reading-title">${r.title}</div>
        ${byline ? `<div class="reading-authors">${byline}</div>` : ''}
        ${r.journal ? `<div class="reading-journal">${r.journal}</div>` : ''}
        ${tags ? `<div class="reading-tags">${tags}</div>` : ''}
        <div class="reading-desc" style="font-size:.78rem;color:var(--ink3);margin-bottom:8px;line-height:1.55">${r.desc}</div>
        <a class="reading-link ${r.isPdf?'pdf-link':''}" href="${r.url}" target="_blank" rel="noopener">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
          ${r.urlLabel}
        </a>
      </div>
    </div>`;
  });
  html += `<div class="add-your-own">
    <div class="add-your-own-title">➕ Adding your own readings &amp; PDFs</div>
    <div class="add-your-own-desc">
      Find the <code>RESOURCES</code> object near the bottom of the HTML file. Under <code>readings:</code>, add a new entry in this format:<br><br>
      <code>{ type: "pdf", title: "Paper title", authors: "Author, A.", journal: "Journal Name", year: 2023,<br>
      &nbsp;&nbsp;tags: ["flora"], desc: "Short summary.", url: "https://...", urlLabel: "Download PDF", isPdf: true }</code><br><br>
      Valid <code>type</code> values: <code>"pdf"</code> · <code>"journal"</code> · <code>"book"</code> · <code>"web"</code><br>
      Valid <code>tags</code> values: <code>"flora"</code> · <code>"fungi"</code> · <code>"invasive"</code> · <code>"micronesia"</code> · <code>"identification"</code>
    </div>
  </div>`;
  el.innerHTML = html;
}

function setResTab(tab) {
  document.querySelectorAll('.res-tab').forEach(t => t.classList.toggle('active', t.dataset.rt === tab));
  document.getElementById('rtCommunity').style.display = tab === 'community' ? 'block' : 'none';
  document.getElementById('rtReadings').style.display  = tab === 'readings'  ? 'block' : 'none';
}

// ── VIEW TOGGLE (updated) ─────────────────────────────────────────────
function setView(v) {
  currentView = v;
  document.getElementById('viewGrid').style.display      = v === 'grid'      ? 'block' : 'none';
  document.getElementById('viewMap').style.display       = v === 'map'        ? 'block' : 'none';
  document.getElementById('viewResources').style.display = v === 'resources'  ? 'block' : 'none';
  document.querySelector('.toolbar').style.display       = v === 'resources'  ? 'none'  : '';
  document.getElementById('btnGrid').classList.toggle('active', v === 'grid');
  document.getElementById('btnMap').classList.toggle('active',  v === 'map');
  document.getElementById('btnRes').classList.toggle('active',  v === 'resources');
  if (v === 'map') renderMap();
  if (v === 'resources') { renderCommunity(); renderReadings(); }
}

// ── EVENTS ────────────────────────────────────────────────────────────
document.querySelectorAll('#groupTabs .tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('#groupTabs .tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    gFilter = tab.dataset.g;
    rebuildTaxSelect();
    applyAll();
  });
});
document.getElementById('taxGroupSelect').addEventListener('change', e => {
  taxFilter = e.target.value; applyAll();
});
document.getElementById('sortSelect').addEventListener('change', e => {
  sortBy = e.target.value; applyAll();
});
let searchTimer;
document.getElementById('searchInput').addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => { query = e.target.value; applyAll(); }, 200);
});

// ── INIT ──────────────────────────────────────────────────────────────
applyAll();
</script>
</body>
</html>
